<div class="card shadow-sm border-0 p-3 animate__animated animate__fadeIn">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold text-primary m-0" data-i18n="m_view_req">Requirement History</h5>
    <div class="d-flex gap-2 w-50">
      <input type="text" id="historySearch" class="form-control shadow-sm" 
             data-i18n-placeholder="search_order_placeholder"
             placeholder="Search Order, Geo, P/N, or Desc..." oninput="filterHistory()">
  
</div>
      <button id="editBtn" class="btn btn-outline-primary" onclick="handleEditClick()" disabled data-i18n="edit">
        <i class="bi bi-pencil-square me-1"></i><span class="i18n-label">Edit</span>
      </button>
      <div class="dropdown">
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" id="exportDropdownBtn" data-i18n="export">
          <span class="i18n-label">Export</span> <i class="bi bi-download ms-1"></i>
        </button>
        <ul class="dropdown-menu">
          <li>
            <button class="dropdown-item" type="button" onclick="handleExport('REQ', 'CSV', event)">
              <i class="bi bi-filetype-csv me-2"></i>CSV
            </button>
          </li>
          <li>
            <button class="dropdown-item" type="button" onclick="handleExport('REQ', 'EXCEL', event)">
              <i class="bi bi-file-earmark-excel me-2"></i>Excel
            </button>
          </li>
          <li>
            <button class="dropdown-item" type="button" onclick="handleExport('REQ', 'PDF', event)">
              <i class="bi bi-file-pdf me-2"></i>PDF
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="row g-2 mb-3 bg-light p-2 rounded border mx-0">
    <div class="col-md-3">
      <select id="filterFaena" class="form-select form-select-sm" onchange="filterHistory()">
        <option value="" data-i18n="all_sites">All Sites (Faenas)</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="filterStatus" class="form-select form-select-sm" onchange="filterHistory()">
        <option value="" data-i18n="all_statuses">All Statuses</option>
        <option value="Pending" data-i18n="status_pending">Pending</option>
        <option value="Quoted" data-i18n="status_quoted">Quoted</option>
        <option value="PO Created" data-i18n="status_po_created">PO Created</option>
      </select>
    </div>
    <div class="col-md-6 text-end">
  <span id="selectionBadge" class="badge bg-primary d-none mb-1">0 Orders Selected</span>
  <br>
  <small class="text-muted me-2" data-i18n="click_rows_help">Click rows to select. Use <strong>Ctrl + Click</strong> for multiple.</small>
  <button class="btn btn-sm btn-outline-danger border-0" onclick="clearSelection()" data-i18n="clear_all">
    <i class="bi bi-x-circle"></i><span class="i18n-label"> Clear All</span>
  </button>
</div>
  </div>

  <div class="table-responsive" style="max-height: 600px;">
    <table class="table table-hover align-middle border" id="historyTable">
      <thead class="table-dark sticky-top">
        <tr style="cursor: pointer;">
          <th onclick="sortTable(0)" data-i18n="order_no"><span class="i18n-label">Order #</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(1)" data-i18n="date"><span class="i18n-label">Date</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(2)" data-i18n="faena"><span class="i18n-label">Faena</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(3)" data-i18n="geo"><span class="i18n-label">Geo Code</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(4)" data-i18n="pn"><span class="i18n-label">P/N</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(5)" data-i18n="desc"><span class="i18n-label">Description</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(6)" data-i18n="qty"><span class="i18n-label">Qty</span> <i class="bi bi-arrow-down-up small"></i></th>
          <th onclick="sortTable(7)" data-i18n="status"><span class="i18n-label">Status</span> <i class="bi bi-arrow-down-up small"></i></th>
        </tr>
      </thead>
      <tbody id="historyTableBody">
        <tr><td colspan="8" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
<style>
  .row-selected { background-color: #e7f1ff !important; border-left: 4px solid #0d6efd !important; }
  #historyTable thead th { white-space: nowrap; font-size: 0.85rem; }
  #historyTable tbody td { font-size: 0.85rem; }
</style>


<div class="modal fade" id="editReqModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><span data-i18n="edit_req_title">Edit Requirement:</span> <span id="editModalOrderNum"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      
      <div class="modal-body">
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label fw-bold" data-i18n="edit_faena_label">Site (Faena)</label>
            <input type="text" id="editFaena" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold" data-i18n="status">Status</label>
            <select id="editStatus" class="form-select">
              <option value="Pending" data-i18n="status_pending">Pending</option>
              <option value="Quoted" data-i18n="status_quoted">Quoted</option>
              <option value="PO Created" data-i18n="status_po_created">PO Created</option>
            </select>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-sm border align-middle">
            <thead class="table-light">
              <tr>
                <th style="width: 150px;" data-i18n="geo">Geo</th>
                <th data-i18n="pn">P/N</th>
                <th data-i18n="desc">Description</th>
                <th style="width: 80px;" data-i18n="qty">Qty</th>
                <th style="width: 40px;"></th>
              </tr>
            </thead>
            <tbody id="editItemsTableBody"></tbody>
          </table>
        </div>

        <div class="mb-3 position-relative">
          <label class="form-label fw-bold text-success" data-i18n="add_item_search_label">Add New Item via Search</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
            <input type="text" id="editItemSearch" class="form-control" 
                   data-i18n-placeholder="add_item_search_placeholder"
                   placeholder="Search P/N or Description to add..." oninput="handleEditSearch(this.value)">
          </div>
          <ul id="editSearchResults" class="list-group position-absolute w-100 shadow-lg d-none" 
              style="z-index: 1060; max-height: 200px; overflow-y: auto;">
          </ul>
        </div>

        <button type="button" class="btn btn-sm btn-outline-success" onclick="addEditRow()" data-i18n="add_item_manually">
          <i class="bi bi-plus-circle"></i><span class="i18n-label"> Add Item Manually</span>
        </button>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="modal_cancel">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveRequirementChanges()" data-i18n="modal_save">
          <span id="saveBtnSpinner" class="spinner-border spinner-border-sm d-none"></span><span class="i18n-label"> Save Changes</span>
        </button>
      </div>
    </div>
  </div>
</div>
