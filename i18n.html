if (typeof currentLang === 'undefined') currentLang = 'es';

function i18n(key) { 
  if (!translations[currentLang]) return key;
  return translations[currentLang][key] || key; 
}

function toggleLanguage() {
  currentLang = (currentLang === 'es') ? 'en' : 'es';
  updateUI();
}

/**
 * Updates all elements with data-i18n and data-i18n-placeholder attributes.
 * Uses .i18n-label span when present to protect <i> icon tags.
 */
function updateUI() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const translation = i18n(key);
    const labelSpan = el.querySelector('.i18n-label');
    if (labelSpan) {
      labelSpan.innerText = translation;
    } else {
      el.innerText = translation;
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    el.setAttribute('placeholder', i18n(key));
  });
}
