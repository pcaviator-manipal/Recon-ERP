if (typeof currentLang === 'undefined') currentLang = 'es';

function i18n(key) { 
  if (!translations[currentLang]) return key;
  return translations[currentLang][key] || key; 
}

function toggleLanguage() {
  currentLang = (currentLang === 'es') ? 'en' : 'es';
  updateUI();
}

/**
 * FIXED: This now looks for a <span> inside the element with the data-i18n attribute.
 * This prevents the translation from deleting your <i> icon tags.
 */
function updateUI() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const translation = i18n(key);
    
    // TARGET ONLY THE SPAN: This protects your <i> icons!
    const labelSpan = el.querySelector('.i18n-label');
    if (labelSpan) {
      labelSpan.innerText = translation;
    } else {
      el.innerText = translation;
    }
  });
}
