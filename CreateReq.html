<div class="card p-3 shadow-sm border-0">
  <div class="row g-3 mb-3">
    <div class="col-md-4">
      <label class="small fw-bold text-uppercase" data-i18n="site">Project Site</label>
      <select id="siteSelect" class="form-select"></select>
    </div>
    <div class="col-md-8">
      <label class="small fw-bold text-uppercase">Search</label>
      <input type="text" id="itemSearch" class="form-control" oninput="window.processSearch()">
    </div>
  </div>

  <table class="table table-sm">
    <thead class="table-dark">
      <tr>
        <th>Geo</th><th>P/N</th><th>Description</th><th>Stock</th><th>Qty</th><th></th>
      </tr>
    </thead>
    <tbody id="searchResults"></tbody>
  </table>

  <div class="mt-3 border-top pt-2">
    <h6>Cart</h6>
    <table class="table table-sm"><tbody id="cartBody"></tbody></table>
  </div>

  <div class="text-end border-top pt-3 mt-3">
  <button id="btnSubmit" 
          class="btn btn-primary px-5 fw-bold shadow-sm" 
          onclick="window.finalizeReq()" 
          disabled 
          data-i18n="preview_email">
    <i class="bi bi-eye me-2"></i>Preview Email
  </button>
</div>
</div>

<script>
  // Small trigger to fill site dropdown and update UI on load [cite: 8, 9]
  (function() {
    const sel = document.getElementById('siteSelect');
    if (sel && window.cachedSites) {
      sel.innerHTML = window.cachedSites.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
    }
    window.updateCartUI();
    if(typeof updateUI === 'function') updateUI();
  })();
</script>
