<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body d-flex justify-content-between align-items-center bg-white rounded">
      <div>
        <h4 class="mb-0 fw-bold text-dark" data-i18n="p_header">Master Product Inventory</h4>
        <p class="text-muted small mb-0" data-i18n="p_sub">Manage your central catalog and stock levels</p>
      </div>
      <button type="button" class="btn btn-success shadow-sm px-4" onclick="window.openAddProductModal()">
        <i class="bi bi-plus-circle me-2"></i>
        <span data-i18n="p_add_item">Add New Item</span>
      </button>
    </div>
  </div>

  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="text" id="prodSearch" class="form-control" data-i18n-placeholder="p_search_placeholder" onkeyup="window.handleSearchInput()">
        </div>
        <div class="col-md-2">
          <select id="filterCategory" class="form-select" onchange="window.handleSearchInput()"></select>
        </div>
        <div class="col-md-2">
          <select id="filterSubCategory" class="form-select" onchange="window.handleSearchInput()"></select>
        </div>
        <div class="col-md-2">
          <select id="filterBrand" class="form-select" onchange="window.handleSearchInput()"></select>
        </div>
        <div class="col-md-3">
          <select id="filterSupplier" class="form-select" onchange="window.handleSearchInput()"></select>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="table-responsive" style="max-height: 70vh;">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light sticky-top">
          <tr>
            <th data-i18n="geo">Geo Code</th>
            <th data-i18n="m_pn">Part Number</th>
            <th data-i18n="m_cat">Category</th>
            <th data-i18n="m_subcat">Subcategory</th>
            <th data-i18n="m_brand">Brand</th>
            <th data-i18n="desc">Description (EN) / (ES)</th>
            <th data-i18n="m_un">Unit</th>
            <th data-i18n="m_stock" class="text-center">Stock</th>
            <th data-i18n="m_cost" class="text-center">Cost</th>
            <th data-i18n="m_supplier">Supplier</th>
            <th data-i18n="m_actions" class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center py-3">
      <div class="text-muted small" id="paginationInfo"></div>
      <div id="paginationControls" class="btn-group btn-group-sm"></div>
    </div>
  </div>
</div>
