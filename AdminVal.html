<div class="container-fluid py-4">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
      <div>
        <h4 id="valTitle" class="fw-bold mb-0 text-primary">---</h4>
        <p id="valSubtitle" class="text-muted small mb-0">Manage validation list</p>
      </div>
      <button class="btn btn-primary" onclick="openValModal()">
        <i class="bi bi-plus-circle me-2"></i>Add New
      </button>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead id="valTableHead" class="table-light"></thead>
          <tbody id="valTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="valModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="valModalTitle">Item Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="valModalBody">
        </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveValItem()">Save</button>
      </div>
    </div>
  </div>
</div>
